<!DOCTYPE html>
<html lang=en>
<head>
  <title>Project Gambler Login</title>
  <meta charset=utf-8 />
  <meta name=viewport value=width=device-width; initial-scale=1.0 />
  <link rel=stylesheet href=login.css crossorigin=anonymous />
</head>


<body>
  <h1>Project Gambler</h1>
  <nav class="navbar">
    <ul>
      <li><a href="login.html">Login</a></li>
    </ul>
  </nav>

  <center>
  <h2>Login</h2>
  <form id="loginForm" onsubmit="return checkLogin()">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required><br><br>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required><br><br>
      <button type="button" onclick="checkLogin()">Login</button>
      <button type="button">Register</button>
    </form>
  </center>

  <script src="login.js"></script>
</body>
</html>
